document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 'Bodoni Moda', serif; font-size: 17px; line-height: 1.6\">Exploring how intelligent systems model change across neural signals, biological motion, spatial intelligence, and world models — with a focus on translating emerging technology into products and venture-scale companies.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position: absolute; bottom: 24px; left: 6vw; z-index: 3; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase\">scroll ↓ <span style=\"animation: blink 1.2s steps(1) infinite\">▼<\u002Fspan><\u002Fdiv>\n    <div style=\"position: absolute; bottom: 24px; right: 6vw; z-index: 3; font-size: 11px; letter-spacing: 0.2em\">{{ coords }}<\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ================= TICKER ================= -->\n  <div style=\"background: #111; color: #e8e8e6; overflow: hidden; white-space: nowrap; border-top: 1px solid #111; border-bottom: 1px solid #111; padding: 10px 0\">\n    <div style=\"display: inline-flex; animation: marquee 22s linear infinite; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase\">\n      <span style=\"padding-right: 40px\">source code / not a brand / show yourself / assembly / future is here / glitch out / meeting anotherself / experiencing the new world /&nbsp;<\u002Fspan>\n      <span style=\"padding-right: 40px\">source code / not a brand / show yourself / assembly / future is here / glitch out / meeting anotherself / experiencing the new world /&nbsp;<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= ABOUT ================= -->\n  <section id=\"about\" data-screen-label=\"About\" style=\"padding: 110px 6vw; display: grid; grid-template-columns: minmax(260px, 420px) 1fr; gap: 60px; align-items: start; position: relative\">\n    <div class=\"rv\" style=\"position: relative\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"e8276e2e-6cac-4d56-899b-58e7847af672#/image-slot.js\" id=\"about-photo\" src=\"uploads/Arisa_Matsuzaki_headshot_3.png\" placeholder=\"your portrait\" shape=\"rect\" hint-size=\"100%,520px\" style=\"width: 100%; height: 520px; display: block; filter: grayscale(1) contrast(1.1)\"><\u002Fx-import>\n      <div style=\"position: absolute; bottom: -16px; left: -16px; font-size: 34px; animation: floaty 6s ease-in-out infinite\">✦<\u002Fdiv>\n      <div style=\"margin-top: 14px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #555\">01 — Arisa A. Matsuzaki · UCLA · Los Angeles · 35mm eq.<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"rv\" style=\"display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap\">\n        <h2 style=\"margin: 0; font-family: 'Mrs Saint Delafield', cursive; font-weight: 400; font-size: clamp(60px, 8vw, 110px); line-height: 0.9\">About<\u002Fh2>\n        <span style=\"font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 0.3em; text-transform: uppercase; writing-mode: vertical-rl; border: 1px solid #111; padding: 10px 4px\">introduction<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"rv\" style=\"max-width: 640px; margin-top: 26px; display: grid; gap: 18px; font-size: 15px; line-height: 1.75\">\n        <p style=\"margin: 0\"><strong>INTRODUCTION.<\u002Fstrong><\u002Fp>\n        <p style=\"margin: 0; font-family: 'Bodoni Moda', serif; font-size: 20px; line-height: 1.6\">I'm Arisa, a UCLA Neuroscience graduate whose work sits at the intersection of imaging, computation, and medicine. My current research focuses on reconstructing and analyzing dynamic vascular deformation during simulated thrombectomy using computer vision, segmentation, and 4D reconstruction workflows.<\u002Fp>\n        <p style=\"margin: 0; color: #333\">Across projects, I keep returning to the same question: how do complex systems represent change over time? In the lab, that means vascular motion, neural signals, eye movements, and predictive models. Outside the lab, it means understanding how neurotechnology and health innovation move from technical insight to clinical and commercial reality.<\u002Fp>\n        <p style=\"margin: 0; color: #333\">I bring a cross-cultural lens to that work as a Japanese-English bilingual researcher with experience in public health, clinical operations, K–12 STEM teaching, geriatric preventive healthcare, and technical mentorship.<\u002Fp>\n        <div style=\"display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px\">\n          <a href=\"mailto:alyssamatsuzaki@gmail.com\" style=\"border: 1px solid #111; border-radius: 999px; padding: 6px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #111; text-decoration: none\" style-hover=\"background: #111; color: #e8e8e6\">Email<\u002Fa>\n          <a href=\"https://linkedin.com/in/arisa-a-matsuzaki\" style=\"border: 1px solid #111; border-radius: 999px; padding: 6px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #111; text-decoration: none\" style-hover=\"background: #111; color: #e8e8e6\">LinkedIn<\u002Fa>\n          <a href=\"https://github.com/alyssamatsuzaki\" style=\"border: 1px solid #111; border-radius: 999px; padding: 6px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #111; text-decoration: none\" style-hover=\"background: #111; color: #e8e8e6\">GitHub<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= WRITINGS ================= -->\n  <section id=\"writings\" data-screen-label=\"Writings\" style=\"padding: 100px 6vw; background: #dcdcd9; border-top: 1px solid #111; border-bottom: 1px solid #111; position: relative; overflow: hidden\">\n    <div style=\"position: absolute; top: 30px; right: 5vw; font-size: 44px; animation: floaty2 7s ease-in-out infinite\">✦<\u002Fdiv>\n    <div class=\"rv\" style=\"display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap\">\n      <h2 style=\"margin: 0; font-family: 'Anton', sans-serif; font-size: cla ransform: uppercase; color: #555\">{{ e.org }}<\u002Fdiv>\n              <p style=\"margin: 4px 0 0; font-size: 13px; line-height: 1.6; color: #333; max-width: 560px\">{{ e.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= LIFE & INTERESTS ================= -->\n  <section id=\"life\" data-screen-label=\"Life and Interests\" style=\"padding: 100px 6vw; background: #dcdcd9; border-top: 1px solid #111; border-bottom: 1px solid #111; position: relative; overflow: hidden\">\n    <div class=\"rv\" style=\"display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap\">\n      <h2 style=\"margin: 0; font-family: 'Mrs Saint Delafield', cursive; font-weight: 400; font-size: clamp(60px, 8vw, 110px); line-height: 0.9\">Life<\u002Fh2>\n      <span style=\"font-family: 'Anton', sans-serif; font-size: clamp(30px, 4vw, 54px); text-transform: uppercase\">&amp; Interest<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"rv\" style=\"margin: 12px 0 0; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #555\">outside the lab<\u002Fp>\n    <div class=\"rv\" style=\"margin-top: 40px; display: grid; gap: 18px; max-width: 680px; font-size: 15px; line-height: 1.8; color: #222\">\n      <p style=\"margin: 0\">I grew up around movement and performance, especially figure skating, dance, track, and music. Those environments taught me how much craft comes from repetition, timing, and body awareness.<\u002Fp>\n      <p style=\"margin: 0\">I am also interested in visual culture: fashion, editorial layouts, Y2K/cyber aesthetics, typography, and the way personal style can communicate mood before words do.<\u002Fp>\n      <p style=\"margin: 0\">Travel and language are a major part of how I see the world. I like being in places where I have to adapt quickly, listen closely, and move between cultural contexts with care.<\u002Fp>\n    <\u002Fdiv>\n    <div clas ; display: block; filter: grayscale(1)\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"image-slot\" from=\"e8276e2e-6cac-4d56-899b-58e7847af672#/image-slot.js\" id=\"gal-movement\" placeholder=\"movement photo\" shape=\"rect\" hint-size=\"100%,320px\" style=\"width: 100%; height: 320px; display: block; filter: grayscale(1)\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"image-slot\" from=\"e8276e2e-6cac-4d56-899b-58e7847af672#/image-slot.js\" id=\"gal-style\" placeholder=\"style photo\" shape=\"rect\" hint-size=\"100%,320px\" style=\"width: 100%; height: 320px; display: block; filter: grayscale(1)\"><\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= CONTACT ================= -->\n  <section id=\"contact\" data-screen-label=\"Contact\" style=\"padding: 120px 6vw 60px; background: #111; color: #e8e8e6; position: relative; overflow: hidden\">\n    <div style=\"position: absolute; top: 40px; right: 8vw; font-size: 36px; color: #e8e8e6; animation: spinstar 12s linear infinite\">✦<\u002Fdiv>\n    <div class=\"rv\" style=\"text-align: center\">\n      <div style=\"font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 12px\">— say hello —<\u002Fdiv>\n      <h2 style=\"margin: 0; line-height: 0.85\">\n        <span style=\"font-family: 'Mrs Saint Delafield', cursive; font-weight: 400; font-size: clamp(70px, 12vw, 170px); display: block\">Contact<\u002Fspan>\n      <\u002Fh2>\n      <a href=\"mailto:alyssamatsuzaki@gmail.com\" style=\"display: inline-block; margin-top: 36px; color: #e8e8e6; text-decoration: none; border: 1px solid #e8e8e6; border-radius: 999px; padding: 16px 42px; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; transition: background 0.25s, color 0.25s\" style-hover=\"background: #e8e8e6; color: #111\">alyssamatsuzaki@gmail.com ↗<\u002Fa>\n      <div style=\"display: flex; gap: 28px; justify-content: center; margin-top: 34px; font-size: 12px; lett logically and why it matters.\", date: \"FORTHCOMING\", href: \"#writings\" },\n        { num: \"II\", title: \"Investment Notes\", blurb: \"Reactions to real VC memos, fund theses, and portfolio write-ups, and what I would have done differently.\", date: \"FORTHCOMING\", href: \"#writings\" },\n        { num: \"III\", title: \"Original Theses\", blurb: \"My own investment memos on focused corners of neurotech and health.\", date: \"FORTHCOMING\", href: \"#writings\" },\n        { num: \"IV\", title: \"Reflections\", blurb: \"Personal essays on language, movement, culture, and craft.\", date: \"FORTHCOMING\", href: \"#writings\" },\n      ],\n      projects: [\n        { num: \"01\", tag: \"In preparation · First author\", title: \"Architectural Suitability of Pairwise Stereo-DIC for Full-Field Vascular Deformation Measurement\", desc: \"First-author methodological work evaluating pairwise stereo-DIC / MultiDIC for full-field vascular deformation measurement, with attention to camera geometry, calibration constraints, speckle-pattern performance, ROI selection, and practical limitations for soft, curved, moving vessel models.\", status: \"→\" },\n        { num: \"02\", tag: \"Under review · Medical Engineering & Physics\", title: \"4D Vessel Reconstruction for Benchtop Thrombectomy Analysis\", desc: \"Manuscript on 4D vessel reconstruction for benchtop thrombectomy analysis, using multi-camera imaging, SAM2-based vessel segmentation, 4D Gaussian Splatting, mesh reconstruction, and validation workflows to study dynamic vessel deformation.\", status: \"→\" },\n        { num: \"03\", tag: \"Under review · J. NeuroInterventional Surgery\", title: \"Catheter Position and Vessel Deformation During Stent Retriever Withdrawal: A 4D In Vitro Study\", desc: \"In vitro thrombectomy study examining the relationship between catheter position and vessel deformation during stent retriever withdrawal, with 4D imaging used to support quantitative analysis of vascular motion.\", status: \"→\" },\n        { num: \"04\", tag: \"Abstract accepted · CMBE, Kobe 2026\", title: \"4D Vessel Stress Mapping for Safer Endovascular Thrombectomy\", desc: \"Conference abstract on dynamic vessel stress mapping for safer endovascular thrombectomy, presented through the 9th International Conference on Computational and Mathematical Biomedical Engineering.\", status: \"→\" },\n        { num: \"05\", tag: \"Presented · ICMBE, New Orleans 2026\", title: \"Stress Analysis of Blood Vessels During Thrombectomy With 4D Reconstruction\", desc: \"Conference presentation using 4D reconstruction to analyze blood-vessel stress during thrombectomy and compare deformation patterns across simulated retrieval conditions.\", status: \"→\" },\n        { num: \"06\", tag: \"In preparation · UCLA Research Week 2025\", title: \"Reading in Hyperspace: Bridging Human Eye Movements and Large Language Models\", desc: \"VR eye-tracking and reading-behavior project with the Comparative Cognition Lab, using Unity, eye-movement data, reaction-time analysis, and MATLAB/Python modeling to explore parallels between human reading dynamics and language-model architectures.\", status: \"→\" },\n        { num: \"07\", tag: \"Comparative Cognition Conference Program, 2025\", title: \"Empirical Evidence Supporting the Grand Unified Theory of Mind and Brain\", desc: \"Contributed to research on reaction-time studies in auditory and visual perception, connecting neurophysics, cognitive processing, and the Grand Unified Theory of Mind and Brain.\", status: \"→\" },\n      ],\n      skillGroups: [\n        { name: \"Programming & Data Analysis\", items: [\n          { label: \"Python\", note: \"\" }, { label: \"MATLAB\", note: \"\" }, { label: \"NumPy / SciPy\", note: \"\" },\n          { label: \"R\", note: \"\" }, { label: \"SQL\", note: \"\" }, { label: \"Statistical modeling\", note: \"\" }, { label: \"Data visualization\", note: \"\" },\n        ]},\n        { name: \"Computer Vision & Imaging\", ,\n        ]},\n      ],\n      experience: [\n        { years: \"Aug 2025 — Present\", role: \"Research Assistant\", org: \"Kaneko Lab · UCLA Health, Interventional Neuroradiology · Los Angeles, CA\", desc: \"Lead and mentor an eight-person undergraduate research team supporting 4D vascular imaging research, including recruitment, onboarding, training, documentation, and reproducible workflow development. Operate and maintain a custom multi-camera thrombectomy imaging platform — OBS-based acquisition, OpenCV calibration and sync, frame extraction, background subtraction, reflection removal, manual masking, SAM2 segmentation, 4D Gaussian Splatting reconstruction, mesh triangulation, and stress-profile generation. Evaluate 4DGS and MultiDIC reconstruction approaches using Blender-based synthetic environments.\" },\n        { years: \"Sep 2024 — Sep 2025\", role: \"Undergraduate Research Assistant\", org: \"Arisaka Lab · UCLA Physics & Astronomy, with Blaisdell & Nariai Labs · Los Angeles, CA\", desc: \"Reviewed PI-authored work on the Grand Unified Theory of Mind and Brain, neurophysics, AI, and computational neuroscience. Collaborated with the Blaisdell Comparative Cognition Lab on VR eye-tracking experiments in Unity examining reading behavior and parallels to LLM architectures. Collaborated with the Nariai Lab in pediatric neurology on clinical EEG analysis for pediatric epilepsy using Python/MATLAB signal processing.\" },\n        { years: \"Sep 2025 — Mar 2026\", role: \"Medical Assistant\", org: \"Vafaie Dermatology · Los Angeles, CA\", desc: \"Supported high-volume clinical operations in a private dermatology practice — assisting procedures, preparing sterile environments, EMR documentation, intake, insurance verification, billing, lab data entry, and post-procedure communication under OSHA, CLIA, and HIPAA compliance.\" },\n        { years: \"Jun 2024 — Aug 2024\", role: \"Behavioral Health Research Intern\", org: \"YoungHappy · Geriatric Preventive Healthcare · Bangkok, Thailand\", desc: \"Conducted market and public-health research on aging trends in Thailand and Japan, developed preventive-health and intergenerational-programming proposals, assisted supervised MoCA administration and scoring, and co-designed technology and language courses for 50+ expatriates and Thai seniors.\" },\n        { years: \"Jan 2022 — Jun 2024\", role: \"Public Health Research Associate\", org: \"Forrest Collective · Integrated Behavioral & Preventive Healthcare · Los Angeles, CA\", desc: \"Conducted community-based participatory research on healthcare disparities in Santa Monica, analyzing social determinants of health, collaborating with providers and officials, and synthesizing findings into equity-focused public health strategies.\" },\n        { years: \"Mar 2022 — Sep 2023\", role: \"Undergraduate Teaching Intern\", org: \"UCLA Cal Teach · K–12 STEM Outreach · Los Angeles, CA\", desc: \"Collaborated with K–12 teachers to design individualized STEM curricula and delivered one-on-one and small-group tutoring to support diverse learning styles.\" },\n        { years: \"Jun 2019 — Mar 2020\", role: \"Intern\", org: \"PVNet · STEM Technology & Education Center · Rolling Hills Estates, CA\", desc: \"Supported operations for a STEM education nonprofit — attendance and registration tracking, community research and outreach, and liaison between program operations and leadership.\" },\n      ],\n      extendedExperience: [\n        { years: \"Mar 2026 — Jun 2026\", role: \"Barista\", org: \"AN Coffee Roastery · Osaka, Japan\", desc: \"Built customer-facing operations experience, consistency under pressure, and day-to-day communication in Japanese within a fast-paced café environment.\" },\n        { years: \"Aug 2019 — Present\", role: \"Figure Skating Coach & Rink Staff\", org: \"Promenade Ice Chalet / LA Kings Ice · Rolling Hills Estates, CA\", desc: \"Coached students of all ages, drawing on 15+ years of skating experience and U.S. Figure Skating Moves in the Field Gold Medalist training.\" },\n        { years: \"Jul 2021 — Sep 2021\", role: \"Service & Hospitality\", org: \"Yakitori Yado · Arcadia, CA\", desc: \"Worked in an outdoor food-market environment, building people-facing operations experience, pace, precision, and hospitality.\" },\n      ],\n      interests: [\n        { name: \"Figure skating\" }, { name: \"Dance\" }, { name: \"Music\" }, { name: \"Travel\" },\n        { name: \"Fashion\" }, { name: \"Typography\" }, { name: \"Y2K / cyber aesthetics\" },\n      ],\n    };\n  }\n\n  componentDidMount() {\n    this._raf = 0;\n    this._cleanup = [];\n    this._initReveals();\n    this._initThree();\n    this._initCoords();\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    (this._cleanup || []).forEach((fn) => fn());\n  }\n\n  _initReveals() {\n    const seen = new WeakSet();\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add(\"on\"); io.unobserve(e.target); } });\n    }, { threshold: 0.05, rootMargin: \"0px 0px -5% 0px\" });\n    const scan = () => {\n      document.querySelectorAll(\".rv\").forEach((el) => {\n        if (!seen.has(el)) { seen.add(el); io.observe(el); }\n      });\n    };\n    scan();\n    // template streams in after mount — rescan as DOM grows\n    const mo = new MutationObserver(scan);\n    mo.observe(document.body, { childList: true, subtree: true });\n    // safety net: if IO never fires (odd embed contexts), reveal everything\n    const failsafe = setTimeout(() => {\n      if (!document.querySelector(\".rv.on\")) {\n        document.querySelectorAll(\".rv\").forEach((el) => el.classList.add(\"on\"));\n      }\n    }, 4000);\n    this._cleanup.push(() => { io.disconnect(); mo.disconnect(); clearTimeout(failsafe); });\n  }\n\n  _initCoords() {\n    const onMove = (e) => {\n      const x = (e.clientX / window.innerWidth).toFixed(3);\n      const y = (e.clientY / window.innerHeight).toFixed(3);\n      this.setState({ coords: \"x:\" + x + \" / y:\" + y });\n      this._mouseX = e.clientX / window.innerWidth * 2 - 1;\n      this._mouseY = e.clientY / window.innerHeight * 2 - 1;\n    };\n    window.addEventListener(\"mousemove\", onMove);\n    this._cleanup.push(() => window.removeEventListener(\"mousemove\", onMove));\n  }\n\n  _makeMatcap() {\n    // procedural chrome matcap: layered radial gradients on a canvas\n    const c = document.createElement(\"canvas\");\n    c.width = c.height = 256;\n    const g = c.getContext(\"2d\");\n    let grad = g.createLinearGradient(0, 0, 256, 256);\n    grad.addColorStop(0, \"#fafafa\");\n    grad.addColorStop(0.25, \"#3a3a3a\");\n    grad.addColorStop(0.4, \"#ffffff\");\n    grad.addColorStop(0.55, \"#1a1a1a\");\n    grad.addColorStop(0.7, \"#e8e8e8\");\n    grad.addColorStop(0.85, \"#2a2a2a\");\n    grad.addColorStop(1, \"#ffffff\");\n    g.fillStyle = grad;\n    g.fillRect(0, 0, 256, 256);\n    grad = g.createRadialGradient(90, 80, 10, 128, 128, 180);\n    grad.addColorStop(0, \"rgba(255,255,255,0.9)\");\n    grad.addColorStop(0.3, \"rgba(255,255,255,0)\");\n    grad.addColorStop(0.75, \"rgba(0,0,0,0.35)\");\n    grad.addColorStop(1, \"rgba(0,0,0,0.8)\");\n    g.fillStyle = grad;\n    g.fillRect(0, 0, 256, 256);\n    const tex = new THREE.CanvasTexture(c);\n    tex.colorSpace = THREE.SRGBColorSpace;\n    return tex;\n  }\n\n  _heartGeometry() {\n    const s = new THREE.Shape();\n    const x = 0, y = 0;\n    s.moveTo(x, y + 0.5);\n    s.bezierCurveTo(x, y + 0.9, x - 0.6, y + 1.1, x - 0.9, y + 0.7);\n    s.bezierCurveTo(x - 1.3, y + 0.2, x - 0.7, y - 0.4, x, y - 1);\n    s.bezierCurveTo(x + 0.7, y - 0.4, x + 1.3, y + 0.2, x + 0.9, y + 0.7);\n    s.bezierCurveTo(x + 0.6, y + 1.1, x, y + 0.9, x, y + 0.5);\n    const geo = new THREE.ExtrudeGeometry(s, { depth: 0.55, bevelEnabled: true, bevelThickness: 0.22, bevelSize: 0.22, bevelSegments: 10, curveSegments: 24 });\n    geo.center();\n    return geo;\n  }\n\n  _initThree() {\n    if (typeof THREE === \"undefined\") { setTimeout(() => this._initThree(), 300); return; }\n    this._mouseX = 0; this._mouseY = 0;\n    const matcap = this._makeMatcap();\n    const mat = new THREE.MeshMatcapMaterial({ matcap });\n\n    // --- hero scene ---\n    const heroCanvas = this.heroCanvasRef.current;\n    let hero = null;\n    if (heroCanvas) {\n      const renderer = new THREE.WebGLRenderer({ canvas: heroCanvas, alpha: true, antialias: true });\n      const scene = new THREE.Scene();\n      const cam = new THREE.PerspectiveCamera(40, 1, 0.1, 100);\n      cam.position.z = 8;\n      const heart = new THREE.Mesh(this._heartGeometry(), mat);\n      heart.position.set(2.9, 1.1, 0);\n      heart.scale.setScalar(1.05);\n      const knot = new THREE.Mesh(new THREE.TorusKnotGeometry(0.62, 0.22, 160, 24), mat);\n      knot.position.set(-3.1, -1.5, 0.5);\n      const blob = new THREE.Mesh(new THREE.IcosahedronGeometry(0.55, 5), mat);\n      blob.position.set(3.4, -1.9, 0.6);\n      scene.add(heart, knot, blob);\n      hero = { renderer, scene, cam, heart, knot, blob, canvas: heroCanvas, basePos: blob.geometry.attributes.position.array.slice() };\n    }\n\n    // --- skills scene ---\n    const skCanvas = this.skillsCanvasRef.current;\n    let sk = null;\n    if (skCanvas) {\n      const renderer = new THREE.WebGLRenderer({ canvas: skCanvas, alpha: true, antialias: true });\n      const scene = new THREE.Scene();\n      const cam = new THREE.PerspectiveCamera(40, 1, 0.1, 100);\n      cam.position.z = 6;\n      const knot = new THREE.Mesh(new THREE.TorusKnotGeometry(1.15, 0.36, 220, 32, 2, 3), mat);\n      scene.add(knot);\n      sk = { renderer, scene, cam, knot, canvas: skCanvas };\n    }\n\n    const resize = (o) => {\n      const w = o.canvas.clientWidth, h = o.canvas.clientHeight;\n      if (o.canvas.width !== w || o.canvas.height !== h) {\n        o.renderer.setSize(w, h, false);\n        o.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n        o.cam.aspect = w / h;\n        o.cam.updateProjectionMatrix();\n      }\n    };\n\n    const clock = new THREE.Clock();\n    const tick = () => {\n      const t = clock.getElapsedTime() * (this.props.accentSpeed ?? 1);\n      const mx = this._mouseX || 0, my = this._mouseY || 0;\n      if (hero) {\n        resize(hero);\n        hero.heart.rotation.y = t * 0.6 + mx * 0.5;\n        hero.heart.rotation.x = Math.sin(t * 0.5) * 0.2 + my * 0.3;\n        hero.heart.position.y = 1.1 + Math.sin(t * 0.9) * 0.18;\n        hero.knot.rotation.x = t * 0.4;\n        hero.knot.rotation.y = t * 0.55 + mx * 0.4;\n        hero.knot.position.y = -1.5 + Math.cos(t * 0.7) * 0.15;\n        // liquid blob: displace vertices with sine noise\n        const pos = hero.blob.geometry.attributes.position;\n        const base = hero.basePos;\n        for (let i = 0; i < pos.count; i++) {\n          const ix = i * 3;\n          const bx = base[ix], by = base[ix + 1], bz = base[ix + 2];\n          const d = 1 + 0.22 * Math.sin(bx * 3 + t * 1.6) * Math.sin(by * 3 + t * 1.2) * Math.sin(bz * 3 + t * 1.4);\n          pos.array[ix] = bx * d; pos.array[ix + 1] = by * d; pos.array[ix + 2] = bz * d;\n        }\n        pos.needsUpdate = true;\n        hero.blob.geometry.computeVertexNormals();\n        hero.blob.rotation.y = t * 0.3;\n        hero.cam.position.x = mx * 0.35;\n        hero.cam.position.y = -my * 0.25;\n        hero.cam.lookAt(0, 0, 0);\n        hero.renderer.render(hero.scene, hero.cam);\n      }\n      if (sk) {\n        resize(sk);\n        sk.knot.rotation.x = t * 0.3 + my * 0.3;\n        sk.knot.rotation.y = t * 0.45 + mx * 0.5;\n        sk.renderer.render(sk.scene, sk.cam);\n      }\n      this._raf = requestAnimationFrame(tick);\n    };\n    tick();\n    this._cleanup.push(() => {\n      cancelAnimationFrame(this._raf);\n      if (hero) hero.renderer.dispose();\n      if (sk) sk.renderer.dispose();\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody
